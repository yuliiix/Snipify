<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snipify — נחשו את השיר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0c12;
    --bg-soft: #14151f;
    --line: #262838;
    --text: #eef0f7;
    --text-dim: #8a8da3;
    --accent: #8b5cf6;
    --accent-2: #22d3c9;
    --danger: #f4574f;
    --success: #34d399;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(139,92,246,0.15), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(34,211,201,0.12), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Heebo', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:520px;
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:20px;
    padding:32px 28px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:28px;
    margin:0 0 4px;
    letter-spacing:-0.02em;
  }
  h1 span{color:var(--accent-2);}
  .subtitle{
    color:var(--text-dim);
    font-size:14px;
    margin:0 0 28px;
  }

  /* Progress dots representing the duration ladder */
  .ladder{
    display:flex;
    gap:6px;
    margin-bottom:20px;
  }
  .ladder .seg{
    flex:1;
    height:6px;
    border-radius:4px;
    background:var(--line);
    transition:background .25s ease;
  }
  .ladder .seg.used{ background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

  .waveform{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    height:64px;
    margin-bottom:24px;
  }
  .waveform i{
    width:4px;
    border-radius:3px;
    background:var(--accent);
    opacity:.35;
    height:14px;
    transition: height .15s ease, opacity .15s ease, background .15s ease;
  }
  .waveform.playing i{ background:var(--accent-2); opacity:1; animation: bounce 0.9s ease-in-out infinite; }
  .waveform i:nth-child(odd){ animation-delay:.15s; }
  .waveform i:nth-child(3n){ animation-delay:.3s; }
  @keyframes bounce{
    0%,100%{ height:14px; }
    50%{ height:52px; }
  }

  .status-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
    font-family:'Space Grotesk', sans-serif;
  }
  .status-row .duration{ font-size:22px; font-weight:700; color:var(--accent-2); }
  .status-row .attempt{ font-size:13px; color:var(--text-dim); }

  button{
    font-family:'Heebo', sans-serif;
    cursor:pointer;
    border:none;
    border-radius:12px;
    font-weight:600;
    transition: transform .12s ease, opacity .12s ease;
  }
  button:active{ transform: scale(0.97); }
  button:disabled{ opacity:.4; cursor:not-allowed; }

  .btn-primary{
    width:100%;
    padding:16px;
    font-size:16px;
    background: linear-gradient(90deg, var(--accent), #6d5bd0);
    color:white;
    margin-bottom:12px;
  }
  .give-up-btn{
    display:block;
    width:100%;
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:13px;
    text-decoration:underline;
    text-underline-offset:3px;
    padding:4px;
    margin-bottom:14px;
    cursor:pointer;
  }
  .give-up-btn:hover:not(:disabled){ color:var(--accent-2); }
  .row{
    display:flex;
    gap:10px;
    margin-bottom:12px;
  }
  .btn-secondary{
    flex:1;
    padding:12px 6px;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--text);
    font-size:13px;
  }
  .btn-secondary:hover:not(:disabled){ border-color:var(--accent); }

  input[type=text]{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--bg);
    color:var(--text);
    font-family:'Heebo', sans-serif;
    font-size:15px;
    margin-bottom:12px;
  }
  input[type=text]:focus{ outline:none; border-color:var(--accent-2); }

  .guess-wrap{
    position:relative;
    margin-bottom:12px;
  }
  .guess-wrap input[type=text]{ margin-bottom:0; }
  .suggestions{
    position:absolute;
    top:calc(100% + 4px);
    right:0;
    left:0;
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    z-index:20;
    max-height:220px;
    overflow-y:auto;
    display:none;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
  }
  .suggestions.show{ display:block; }
  .suggestion-item{
    padding:10px 16px;
    cursor:pointer;
    font-size:14px;
    display:flex;
    justify-content:space-between;
    gap:8px;
    align-items:baseline;
  }
  .suggestion-item:hover, .suggestion-item.active{ background:var(--bg); }
  .suggestion-item .s-title{ color:var(--text); font-weight:600; }
  .suggestion-item .s-artist{ color:var(--text-dim); font-size:12px; white-space:nowrap; }

  .feedback{
    text-align:center;
    font-size:14px;
    padding:10px;
    border-radius:10px;
    margin-bottom:14px;
    display:none;
  }
  .feedback.wrong{ display:block; background:rgba(244,87,79,0.12); color:var(--danger); }
  .feedback.right{ display:block; background:rgba(52,211,153,0.12); color:var(--success); }

  .reveal{
    display:none;
    text-align:center;
    padding-top:8px;
  }
  .reveal.show{ display:block; }
  .reveal .art{ font-size:14px; color:var(--text-dim); margin-bottom:2px; }
  .reveal .ttl{ font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:700; margin-bottom:16px; }
  .reveal a{
    display:inline-block;
    padding:10px 18px;
    border-radius:10px;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--accent-2);
    text-decoration:none;
    font-size:14px;
    margin-bottom:14px;
  }

  #player{ position:absolute; width:200px; height:200px; left:-9999px; top:-9999px; }

  .hint{
    text-align:center;
    color:var(--text-dim);
    font-size:12px;
    margin-top:6px;
  }
</style>
</head>

<div class="card">
  <h1>Snip<span>ify</span></h1>
  <p class="subtitle">האזינו לקטע קצר ונחשו את השיר. כל דילוג מאריך את הקטע — ובכל פתיחה מגיע שיר אחר.</p>

/* =========================================================
   בחירת שיר "הוגנת": שומרים תור מעורבב כדי שלא יחזור אותו
   שיר עד שכל הרשימה נוגנה. נשמר בדפדפן כדי שבפתיחה הבאה
   של הקובץ יופיע שיר שונה (עובד כשפותחים את הקובץ ישירות
   בדפדפן; בתצוגה המקדימה בתוך Claude ייתכן ולא יישמר).
   ========================================================= */
const QUEUE_KEY = 'snipify_queue_v1';

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadQueue(){
  try{
    const raw = localStorage.getItem(QUEUE_KEY);
    if(!raw) return [];
    const arr = JSON.parse(raw);
    // מסנן אינדקסים שכבר לא קיימים (אם הרשימה השתנתה)
    return arr.filter(i => i >= 0 && i < SONGS.length);
  }catch(e){
    return [];
  }
}

function saveQueue(queue){
  try{
    localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
  }catch(e){
    // localStorage לא זמין (למשל בתצוגה מקדימה) - פשוט ממשיכים בלי שמירה
  }
}

function pickSong(){
  let queue = loadQueue();
  if(queue.length === 0){
    queue = shuffle(SONGS.map((_, i) => i));
  }
  const idx = queue.shift();
  saveQueue(queue);
  return SONGS[idx];
}

function normalize(str){
  return str
    .toLowerCase()
    .replace(/\(.*?\)/g, '')
    .replace(/[^a-z0-9א-ת\s]/gi, '')
    .trim();
}

function isCorrectGuess(guess, song){
  const g = normalize(guess);
  if(!g) return false;
  return normalize(song.title).includes(g) || g.includes(normalize(song.title))
      || normalize(song.artist).includes(g);
}

// ---------- YouTube IFrame API ----------

// לחסום את הסאונד (מדיניות autoplay).
let playerReady = false;
let scReady = false;
let scWidget = null;

function loadYouTubeAPI(){
  if(window.YT && window.YT.Player){ apiReady = true; createPlayer(); return; }
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.body.appendChild(tag);
}
window.onYouTubeIframeAPIReady = function(){
  apiReady = true;
  createPlayer();
};

function createPlayer(){
  if(player) return;
  player = new YT.Player('player', {
    height: '200',
    width: '200',
    videoId: SONGS.find(s => s.source !== 'soundcloud').videoId,
    playerVars: { autoplay: 0, controls: 0, disablekb: 1 },
    events: {
      onReady: (e) => {
        e.target.unMute();
        e.target.setVolume(100);
        playerReady = true;
      },
      onStateChange: onPlayerStateChange,
      onError: onPlayerError
    }
  });
}
loadYouTubeAPI(); // מתחילים לטעון מיד עם פתיחת הדף

function initSoundCloud(){
  if(!window.SC || !window.SC.Widget) { setTimeout(initSoundCloud, 200); return; }

  scWidget.bind(SC.Widget.Events.READY, () => {
    // ה-widget לפעמים מדווח READY רגע לפני שהוא באמת מסוגל לקבל פקודות בצורה
    // אמינה (זה בדיוק ההסבר להפעלה ראשונה "שקטה"). ממתינים חצי שנייה נוספת ליתר ביטחון.
    setTimeout(() => { scReady = true; }, 500);
  });
  scWidget.bind(SC.Widget.Events.PLAY, () => {
    setWaveform(true);
    els.silentWarning.style.display = 'none';
    errorStreak = 0;
    clearTimeout(stuckTimer); // השיר באמת מתנגן - מבטלים את בדיקת "התקיעות"

    // רק עכשיו, כשבאמת יש ניגון בפועל (לא רק שקראנו ל-play), מתחילים לספור
    // את זמן הקטע. זה מונע מצב שבו הטיימר "נשרף" בזמן שהטראק עדיין באפר.
    // בודקים גם שזו עדיין הבקשה העדכנית ביותר (ולא PLAY מאוחר של ניגון קודם/מבוטל,
    // כמו כשלוחצים "נגן שוב" מהר לפני שהטעינה הקודמת הספיקה להתחיל).
    if(pendingSnippetDuration !== null && pendingSnippetToken === scLoadToken){
      const dur = pendingSnippetDuration;
      pendingSnippetDuration = null;
      clearTimeout(checkTimer);
      checkTimer = setTimeout(() => {
        scWidget.pause();
        setWaveform(false);
      }, dur * 1000);
    }
  });
  scWidget.bind(SC.Widget.Events.PAUSE, () => { setWaveform(false); });
  scWidget.bind(SC.Widget.Events.ERROR, () => { onPlayerError({ data: 'SC' }); });
}
initSoundCloud();

// כפתור "הפעלה" נשאר נעול עד ששני מנועי הניגון (YouTube + SoundCloud) באמת מוכנים.
// כך הלחיצה הראשונה על הכפתור תמיד קוראת ל-play/load ישירות מתוך הקליק עצמו,
// בלי לחכות לטעינה א-סינכרונית אחריו - וזה מה שמונע מהדפדפן לחסום את הסאונד בפעם הראשונה.
const readyPoll = setInterval(() => {
  if(playerReady && scReady){
    clearInterval(readyPoll);
    els.startBtn.disabled = false;
    els.startBtn.textContent = '▶ הפעלה';
  }
}, 150);

function onPlayerStateChange(e){
  // 1 = מנגן, כל מצב אחר (מושהה/נעצר/נטען) לא נחשב "מנגן" מבחינת האנימציה
  setWaveform(e.data === 1);
  if(e.data === 1){
    els.silentWarning.style.display = 'none';
    errorStreak = 0;
  }
}

let errorStreak = 0;

function onPlayerError(e){
  // הסרטון/הטראק הזה לא זמין - עוברים אוטומטית לשיר אחר (עד גבול מסוים)
  clearInterval(checkTimer);
  clearTimeout(stuckTimer);
  setWaveform(false);
  errorStreak++;

  if(errorStreak >= 3){
    // כמה כשלים ברצף = כנראה לא בעיה בשיר הספציפי אלא חסימה כללית
    els.silentWarning.textContent = `יש חסימה כללית כאן (קוד שגיאה: ${e.data}). נסו לכבות חוסם פרסומות/תוסף פרטיות לדף הזה, או לפתוח בגלישה בסתר.`;
    els.silentWarning.style.display = 'block';
    return;
  }

  els.silentWarning.textContent = `השיר הזה לא זמין כרגע (קוד ${e.data}) - עובר לשיר אחר...`;
  els.silentWarning.style.display = 'block';
  setTimeout(() => { startGame(); }, 1200);
}

let stuckTimer = null;

// מנגן קטע - נקרא תמיד ישירות מתוך handler של לחיצה אמיתית (start/play/skip)
function playSongSnippet(){
  const isSC = currentSong.source === 'soundcloud';
  clearInterval(checkTimer);
  clearTimeout(checkTimer);
  clearTimeout(stuckTimer);
  const duration = DURATIONS[attemptIndex];
  const start = currentSong.start;
  const end = start + duration;

  els.stopBtn.disabled = false;
  els.silentWarning.style.display = 'none';

  if(isSC){
    if(!scWidget || !scReady) return;
    scLoadToken++; // כל קריאה חדשה (כולל "נגן שוב") מבטלת בקשות קודמות שעוד "באוויר"
    const myToken = scLoadToken;
    pendingSnippetDuration = null;
    const trackUrl = `https://api.soundcloud.com/tracks/${currentSong.scId}`;
    const loadTrack = () => {
      if(myToken !== scLoadToken) return; // בקשה ישנה יותר - מתעלמים
      pendingSnippetDuration = duration;
      pendingSnippetToken = myToken;
      scWidget.load(trackUrl, {
        auto_play: true,
        callback: () => {
          if(myToken !== scLoadToken) return;
          scWidget.seekTo(start * 1000);
          scWidget.play();
          // הטיימר בפועל נקבע ב-PLAY handler (ב-initSoundCloud), רק כשבאמת מתחיל ניגון
        }
      });
    };
    loadTrack();

    // אם אחרי 4 שניות עדיין לא קיבלנו אישור ניגון אמיתי (PLAY event) - השיר תקוע.
    // חשוב: לא בודקים את זה דרך isPaused() כי זו קריאה א-סינכרונית ל-SoundCloud
    // שהתבררה כלא אמינה מספיק (בדיוק כמו getPosition() קודם). אם הטיימר הזה בכלל
    // מגיע לפה - כבר בטוח שהניגון לא התחיל, כי PLAY האמיתי מבטל אותו ישירות.
    let scRetried = false;
    const checkScStuck = () => {
      if(myToken !== scLoadToken) return; // כבר לא רלוונטי - הייתה בקשה חדשה יותר
      if(!scRetried){
        scRetried = true;
        loadTrack();
        stuckTimer = setTimeout(checkScStuck, 4500);
      } else {
        setWaveform(false);
        els.silentWarning.textContent = `לא הצלחתי להשמיע מ-SoundCloud את "${currentSong.title}" (${currentSong.artist}) - נסו לרענן את הדף וללחוץ שוב.`;
        els.silentWarning.style.display = 'block';
      }
    };
    stuckTimer = setTimeout(checkScStuck, 4500);

  } else {
    if(!player || !playerReady || !player.loadVideoById) return;
    player.unMute();
    player.setVolume(100);
    player.loadVideoById({ videoId: currentSong.videoId, startSeconds: start });

    // אם אחרי 3 שניות עדיין לא ממש "מנגן" - ננסה שוב פעם אחת בשקט
    // (זו לפעמים תקלה חד-פעמית של הפקודה הראשונה ליוטיוב, לא בעיה אמיתית)
    let retriedOnce = false;
    const checkStuck = () => {
      const state = player.getPlayerState ? player.getPlayerState() : null;
      if(state !== 1){
        if(!retriedOnce){
          retriedOnce = true;
          player.loadVideoById({ videoId: currentSong.videoId, startSeconds: start });
          stuckTimer = setTimeout(checkStuck, 3000);
        } else {
          setWaveform(false);
          els.silentWarning.textContent = 'לא הצלחתי להשמיע - נסו לרענן את הדף וללחוץ שוב על הפעלה, או לוודא שהעוצמה בדפדפן/במחשב לא באפס.';
          els.silentWarning.style.display = 'block';
        }
      }
    };
    stuckTimer = setTimeout(checkStuck, 3000);

    checkTimer = setInterval(() => {
      const t = player.getCurrentTime ? player.getCurrentTime() : 0;
      if(t >= end - 0.05){
        player.pauseVideo();
        setWaveform(false);
        clearInterval(checkTimer);
      }
    }, 50);
  }
}

function stopSnippet(){
  clearInterval(checkTimer);
  clearTimeout(checkTimer);
  clearTimeout(stuckTimer);
  pendingSnippetDuration = null;
  scLoadToken++; // מבטל כל בקשת ניגון SoundCloud שעוד "באוויר"
  if(currentSong && currentSong.source === 'soundcloud'){
    if(scWidget && scWidget.pause) scWidget.pause();
  } else {
    if(player && player.pauseVideo) player.pauseVideo();
  }
  setWaveform(false);
}

function setWaveform(playing){
  els.waveform.classList.toggle('playing', playing);
}

// ---------- UI flow ----------
function updateStatus(){
  els.durationLabel.textContent = DURATIONS[attemptIndex] + ' שניות';
  els.attemptLabel.textContent = `ניחוש ${attemptIndex + 1} מתוך ${DURATIONS.length}`;
  [...els.ladder.children].forEach((seg, i) => {
    seg.classList.toggle('used', i <= attemptIndex);
  });
  els.skipBtn.disabled = attemptIndex >= DURATIONS.length - 1;
}

function startGame(){
  currentSong = pickSong();
  attemptIndex = 0;
  gameOver = false;
  els.feedback.className = 'feedback';
  els.feedback.textContent = '';
  els.reveal.classList.remove('show');
  els.guessInput.value = '';
  els.suggestions.classList.remove('show');
  currentSuggestions = [];
  activeSuggestionIndex = -1;
  els.guessInput.disabled = false;
  els.guessBtn.disabled = false;
  els.giveUpBtn.disabled = false;
  els.playBtn.disabled = false;
  els.stopBtn.disabled = false;
  els.startBtn.disabled = true;
  updateStatus();

  const isSC = currentSong.source === 'soundcloud';
  const ready = isSC ? scReady : playerReady;

  if(ready){
    playSongSnippet(); // נקרא ישירות מתוך לחיצת "הפעלה" של המשתמש
  } else {
    // הנגן הרלוונטי עדיין נטען - ננסה שוב ברגע שהוא מוכן
    els.silentWarning.textContent = 'הנגן עדיין נטען, רגע אחד ומנסים שוב...';
    els.silentWarning.style.display = 'block';
    const waitForPlayer = setInterval(() => {
      const nowReady = isSC ? scReady : playerReady;
      if(nowReady){
        clearInterval(waitForPlayer);
        els.silentWarning.style.display = 'none';
        playSongSnippet();
      }
    }, 200);
  }
}

// ---------- Autocomplete ----------
let activeSuggestionIndex = -1;
let currentSuggestions = [];

function getSuggestions(query){
  const q = normalize(query);
  if(!q) return [];
  return SONGS
    .filter(s => normalize(s.title).includes(q) || normalize(s.artist).includes(q))
    .slice(0, 8);
}

function renderSuggestions(){
  els.suggestions.innerHTML = '';
  if(currentSuggestions.length === 0){
    els.suggestions.classList.remove('show');
    return;
  }
  currentSuggestions.forEach((song, i) => {
    const item = document.createElement('div');
    item.className = 'suggestion-item' + (i === activeSuggestionIndex ? ' active' : '');
    item.innerHTML = `<span class="s-title"></span><span class="s-artist"></span>`;
    item.querySelector('.s-title').textContent = song.title;
    item.querySelector('.s-artist').textContent = song.artist;
    item.addEventListener('mousedown', (e) => {
      e.preventDefault(); // מונע איבוד פוקוס לפני שהערך נכנס
      selectSuggestion(song);
    });
    els.suggestions.appendChild(item);
  });
  els.suggestions.classList.add('show');
}

function selectSuggestion(song){
  els.guessInput.value = song.title;
  currentSuggestions = [];
  activeSuggestionIndex = -1;
  els.suggestions.classList.remove('show');
  els.guessInput.focus();
}

function handleGuess(){
  if(gameOver) return;
  const guess = els.guessInput.value.trim();
  if(!guess) return;

  if(isCorrectGuess(guess, currentSong)){
    endGame(true);
  } else {
    els.feedback.className = 'feedback wrong';
    els.feedback.textContent = 'לא מדויק, נסו שוב או דלגו';
    if(attemptIndex >= DURATIONS.length - 1){
      endGame(false);
    }
  }
  els.guessInput.value = '';
  els.suggestions.classList.remove('show');
  currentSuggestions = [];
  activeSuggestionIndex = -1;
}

function handleSkip(){
  if(gameOver || attemptIndex >= DURATIONS.length - 1) return;
  attemptIndex++;
  updateStatus();
  els.feedback.className = 'feedback';
  playSongSnippet();
}

function endGame(won){
  gameOver = true;
  clearInterval(checkTimer);
  els.guessInput.disabled = true;
  els.guessBtn.disabled = true;
  els.giveUpBtn.disabled = true;
  els.playBtn.disabled = true;
  els.stopBtn.disabled = true;
  els.skipBtn.disabled = true;

  els.feedback.className = 'feedback ' + (won ? 'right' : 'wrong');
  els.feedback.textContent = won ? 'כל הכבוד! ניחוש נכון 🎉' : 'הפעם לא הצליח, הנה השיר:';

  els.revealArtist.textContent = currentSong.artist;
  els.revealTitle.textContent = currentSong.title;
  els.revealLink.href = currentSong.source === 'soundcloud'
    ? `https://api.soundcloud.com/tracks/${currentSong.scId}`
    : `https://www.youtube.com/watch?v=${currentSong.videoId}`;
  els.reveal.classList.add('show');

  stopSnippet();
}

// ---------- Event bindings ----------
els.startBtn.addEventListener('click', startGame);
els.playBtn.addEventListener('click', playSongSnippet);
els.stopBtn.addEventListener('click', stopSnippet);
els.skipBtn.addEventListener('click', handleSkip);
els.guessBtn.addEventListener('click', handleGuess);
els.giveUpBtn.addEventListener('click', () => {
  if(gameOver) return;
  endGame(false);
});
els.guessInput.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowDown' && currentSuggestions.length){
    e.preventDefault();
    activeSuggestionIndex = (activeSuggestionIndex + 1) % currentSuggestions.length;
    renderSuggestions();
  } else if(e.key === 'ArrowUp' && currentSuggestions.length){
    e.preventDefault();
    activeSuggestionIndex = (activeSuggestionIndex - 1 + currentSuggestions.length) % currentSuggestions.length;
    renderSuggestions();
  } else if(e.key === 'Enter'){
    if(activeSuggestionIndex >= 0 && currentSuggestions[activeSuggestionIndex]){
      selectSuggestion(currentSuggestions[activeSuggestionIndex]);
    } else {
      handleGuess();
    }
  } else if(e.key === 'Escape'){
    currentSuggestions = [];
    activeSuggestionIndex = -1;
    els.suggestions.classList.remove('show');
  }
});
els.guessInput.addEventListener('input', () => {
  activeSuggestionIndex = -1;
  currentSuggestions = getSuggestions(els.guessInput.value);
  renderSuggestions();
});
els.guessInput.addEventListener('blur', () => {
  // דיליי קטן כדי לאפשר ללחיצה על הצעה (mousedown) לפעול קודם
  setTimeout(() => { els.suggestions.classList.remove('show'); }, 150);
});
els.nextBtn.addEventListener('click', startGame);

updateStatus();
</script>
